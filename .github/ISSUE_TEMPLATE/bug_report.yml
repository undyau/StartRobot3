name: Bug report
description: Report something that's broken or not working as expected in StartRobot3
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing StartRobot3! Please fill out as much as you can — details about your event setup (interval, chains, start list) help a lot.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen instead?
      placeholder: e.g. "The clock froze 2 minutes after I pressed Start" or "Runner names were not announced"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What were you doing right before this happened? Include things like interval length, number of chains, whether a start list was loaded, etc.
      placeholder: |
        1. Loaded start list XML
        2. Set interval to 1 minute
        3. Pressed Start
        4. ...
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      description: Found in Settings/About, or ask whoever gave you the app
      placeholder: e.g. 1.0 (1)
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device model and Android version
      placeholder: e.g. Samsung Galaxy A14, Android 14
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: How disruptive was this?
      options:
        - Blocked the event (had to stop/restart)
        - Workaround needed but event continued
        - Annoying but no impact on the event
        - Cosmetic / minor
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots, screen recording, or logs
      description: Drag and drop images/video here if you have them. A screenshot of the Run screen at the time of the issue is especially helpful.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Start list file used, number of runners, audio output device (phone speaker / Bluetooth / wired), etc.
    validations:
      required: false
